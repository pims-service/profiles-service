name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js v20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linting
      run: npm run lint

    - name: Run Tests (Offline/Mock Mode)
      run: npm run test
      env:
        # Mock mode environment triggers
        FIREBASE_PRIVATE_KEY: mock-private-key
        NEXT_PUBLIC_FIREBASE_API_KEY: mock-api-key

    - name: Verify Production Build
      run: npm run build
      env:
        # Build environments
        FIREBASE_PRIVATE_KEY: mock-private-key
        NEXT_PUBLIC_FIREBASE_API_KEY: mock-api-key
